<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | MD Care Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("lT18BxqA4wgJ-8RuJ"); })();
    </script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { primary: '#0d9488', secondary: '#1e293b' } } }
        }
    </script>
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Admin Navbar -->
    <nav class="bg-secondary shadow-md fixed w-full z-50 top-0 left-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex-shrink-0 flex items-center gap-2 hover:opacity-80 transition cursor-pointer">
                    <i class="fa-solid fa-house-medical text-2xl text-primary"></i>
                    <span class="font-bold text-xl text-white">MD Care <span class="text-primary">Admin</span></span>
                </a>
                <div id="admin-controls" class="hidden flex items-center gap-4">
                    <span class="text-slate-300 text-sm hidden sm:inline-block"><i class="fa-solid fa-user-shield mr-1"></i> thenish9997@gmail.com</span>
                    <button onclick="adminLogout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold transition">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div id="admin-login-section" class="flex-grow flex items-center justify-center pt-16">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md mx-4 border-t-4 border-primary">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-teal-50 rounded-full flex items-center justify-center mx-auto mb-4 text-primary text-2xl">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h2 class="text-2xl font-bold text-secondary">Admin Login</h2>
                <p class="text-slate-500 text-sm mt-1">Authorized personnel only</p>
            </div>
            <form id="admin-login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Admin Email</label>
                    <input type="email" id="admin-email" value="thenish9997@gmail.com" readonly class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-slate-50 text-slate-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="admin-pass" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary outline-none transition" placeholder="Enter admin password">
                </div>
                <button type="submit" class="w-full bg-secondary text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition shadow-lg mt-2">
                    Secure Login <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="admin-dashboard-section" class="hidden flex-grow pt-24 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Add New Booking (Admin End) -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-24">
                    <h3 class="font-bold text-secondary text-lg mb-4 border-b pb-2"><i class="fa-solid fa-calendar-plus text-primary mr-2"></i> Add New Booking</h3>
                    <form id="admin-booking-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Patient Name</label>
                            <input type="text" id="add-name" required class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-1 focus:ring-primary outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Phone Number</label>
                            <input type="tel" id="add-phone" required class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-1 focus:ring-primary outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Department</label>
                            <select id="department-select" required class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-1 focus:ring-primary outline-none text-sm bg-white">
                                <option value="" disabled selected>Select Dept</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Oncology">Oncology</option>
                                <option value="Dermatology">Dermatology</option>
                                <option value="Ophthalmology">Ophthalmology</option>
                                <option value="Psychiatry">Psychiatry</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Doctor</label>
                            <select id="doctor-select" required class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-1 focus:ring-primary outline-none text-sm bg-white disabled:bg-gray-100" disabled>
                                <option value="" disabled selected>Select Doctor</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-700 mb-1">Date</label>
                                <input type="date" id="add-date" required class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-1 focus:ring-primary outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-700 mb-1">Time</label>
                                <select id="add-time" required class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-1 focus:ring-primary outline-none text-sm bg-white">
                                    <option value="" disabled selected>Time</option>
                                    <option value="09:00 AM">09:00 AM</option>
                                    <option value="10:00 AM">10:00 AM</option>
                                    <option value="11:30 AM">11:30 AM</option>
                                    <option value="02:00 PM">02:00 PM</option>
                                    <option value="04:00 PM">04:00 PM</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white font-bold py-2.5 rounded-lg hover:bg-teal-700 transition shadow text-sm mt-2">
                            Add Booking
                        </button>
                    </form>
                </div>
            </div>

            <!-- All Bookings Table -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                        <h2 class="text-xl font-bold text-secondary"><i class="fa-solid fa-list-check text-primary mr-2"></i> All Bookings</h2>
                        <button onclick="loadAppointments()" class="text-sm font-bold text-primary hover:text-teal-700 transition"><i class="fa-solid fa-rotate-right mr-1"></i> Refresh</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                                    <th class="p-4 font-bold border-b">Patient Info</th>
                                    <th class="p-4 font-bold border-b">Doctor & Dept</th>
                                    <th class="p-4 font-bold border-b">Schedule</th>
                                    <th class="p-4 font-bold border-b text-center">Status</th>
                                    <th class="p-4 font-bold border-b text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-appointments-list" class="text-sm text-slate-700 divide-y divide-slate-100">
                                <tr><td colspan="4" class="p-8 text-center text-slate-400">Loading appointments...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWp-8CEFAr2cSrcSHEZu7jnaUWUU9DHtY",
            authDomain: "md-care-hospital.firebaseapp.com",
            projectId: "md-care-hospital",
            storageBucket: "md-care-hospital.firebasestorage.app",
            messagingSenderId: "214966558089",
            appId: "1:214966558089:web:d49f400adb427614089558",
            measurementId: "G-K3S90QH9LT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginSection = document.getElementById('admin-login-section');
        const dashboardSection = document.getElementById('admin-dashboard-section');
        const adminControls = document.getElementById('admin-controls');
        const tbody = document.getElementById('admin-appointments-list');

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'thenish9997@gmail.com') {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                adminControls.classList.remove('hidden');
                loadAppointments();
            } else {
                if(user) { signOut(auth); alert("Unauthorized access. Admin only."); }
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                adminControls.classList.add('hidden');
            }
        });

        // Admin Login
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                // If not admin, the onAuthStateChanged will kick them out
            } catch (err) {
                alert("Login Failed: Incorrect Admin Password");
            }
        });

        window.adminLogout = function() {
            signOut(auth);
        };

        // Fetch Appointments
        window.loadAppointments = async function() {
            tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Fetching...</td></tr>';
            try {
                const q = query(collection(db, "appointments"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400">No bookings found in the database.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                snapshot.forEach((document) => {
                    const data = document.data();
                    const id = document.id;
                    const currentStatus = data.status || "Pending";
                    let statusColor = currentStatus === 'Pending' ? 'text-yellow-600 bg-yellow-50 border-yellow-200' : (currentStatus === 'Confirmed' ? 'text-teal-600 bg-teal-50 border-teal-200' : 'text-red-600 bg-red-50 border-red-200');
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-4">
                                <p class="font-bold text-secondary">${data.patientName || 'N/A'}</p>
                                <p class="text-xs text-slate-500 mt-0.5"><i class="fa-solid fa-phone mr-1"></i> ${data.phone || 'N/A'}</p>
                            </td>
                            <td class="p-4">
                                <p class="font-bold text-primary">${data.doctor}</p>
                                <p class="text-xs text-slate-500 bg-slate-200 inline-block px-2 py-0.5 rounded mt-1">${data.department}</p>
                            </td>
                            <td class="p-4">
                                <p class="font-medium text-slate-700"><i class="fa-regular fa-calendar text-primary mr-1"></i> ${data.date}</p>
                                <p class="text-xs text-slate-500 mt-0.5"><i class="fa-regular fa-clock text-primary mr-1"></i> ${data.time}</p>
                            </td>
                            <td class="p-4 text-center">
                                <select onchange="updateBookingStatus('${id}', this.value, '${data.email || ''}', '${data.patientName || 'Patient'}')" class="${statusColor} text-xs font-bold px-2 py-1 rounded outline-none cursor-pointer border hover:border-gray-300 transition">
                                    <option value="Pending" ${currentStatus === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Confirmed" ${currentStatus === 'Confirmed' ? 'selected' : ''}>Confirmed</option>
                                    <option value="Cancelled" ${currentStatus === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </td>
                            <td class="p-4 text-center">
                                <button onclick="deleteAppointment('${id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition" title="Delete Booking">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-medium">Error loading data: ${err.message}<br><span class="text-sm font-normal text-slate-500 mt-2 block">If the error says "Missing or insufficient permissions", your Firestore Rules have not updated yet.</span></td></tr>`;
                console.error(err);
            }
        };

        // Update Booking Status
        window.updateBookingStatus = async function(id, newStatus, patientEmail, patientName) {
            try {
                await updateDoc(doc(db, "appointments", id), { status: newStatus });
                loadAppointments(); // Refresh to update the colors
                
                // Notify Patient via email
                if (patientEmail) {
                    await emailjs.send("service_7o9hcwe", "template_g3n5r4f", {
                        to_email: patientEmail,
                        subject: `Appointment ${newStatus} - MD Care Hospital`,
                        html_message: `
                        <div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; background-color: #f8fafc; padding: 30px; border-radius: 16px;">
                            <div style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0;">
                                <div style="background-color: #1e293b; padding: 40px 20px; text-align: center; border-bottom: 6px solid #0d9488;">
                                    <h1 style="color: #ffffff; margin: 0; font-size: 36px; font-weight: 800; letter-spacing: 0.5px;">MD Care <span style="color: #14b8a6;">Hospital</span></h1>
                                </div>
                                <div style="padding: 50px 40px; color: #334155; line-height: 1.8; font-size: 18px;">
                                    <p style="margin-top: 0;">Dear <strong style="color: #0f172a;">${patientName}</strong>,</p>
                                    <p>We are writing to inform you that your appointment status at MD Care Hospital has been updated to: <span style="display: inline-block; background-color: #f0fdfa; color: #0d9488; padding: 4px 12px; border-radius: 9999px; font-weight: bold; font-size: 16px; margin-left: 5px; border: 1px solid #ccfbf1;">${newStatus}</span></p>
                                    <p>If you have any questions or need to reschedule, please contact our front desk at your earliest convenience.</p>
                                    <p style="margin-bottom: 0;">Thank you for choosing MD Care Hospital for your healthcare needs.</p>
                                </div>
                                <div style="background-color: #f1f5f9; padding: 25px; text-align: center; border-top: 1px solid #e2e8f0;">
                                    <p style="margin: 0; color: #64748b; font-size: 15px;"><strong>MD Care Hospital</strong><br>Basti DanishManda, Jalandhar<br>Phone: 8091919997 | Email: thenish9997@gmail.com</p>
                                </div>
                            </div>
                        </div>`
                    });
                }
            } catch (err) {
                alert("Error updating status: " + err.message);
            }
        };

        // Delete Appointment
        window.deleteAppointment = async function(id) {
            if(confirm("Are you sure you want to completely delete this booking?")) {
                try {
                    await deleteDoc(doc(db, "appointments", id));
                    loadAppointments(); // Refresh
                } catch (err) {
                    alert("Error deleting: " + err.message);
                }
            }
        };

        // Setup Doctor Dropdown mapping (Reused from frontend)
        const doctorsList = [
            { name: "Dr. Rajat Sharma", dept: "Cardiology" }, { name: "Dr. Neha Verma", dept: "Cardiology" }, { name: "Dr. Arjun Patel", dept: "Cardiology" },
            { name: "Dr. Anil Kapoor", dept: "Neurology" }, { name: "Dr. Priya Singh", dept: "Neurology" }, { name: "Dr. Rohan Mehta", dept: "Neurology" },
            { name: "Dr. Vikram Das", dept: "Orthopedics" }, { name: "Dr. Sana Khan", dept: "Orthopedics" }, { name: "Dr. Aditya Rao", dept: "Orthopedics" },
            { name: "Dr. Amit Patel", dept: "Pediatrics" }, { name: "Dr. Kavita Rao", dept: "Pediatrics" }, { name: "Dr. Nidhi Sharma", dept: "Pediatrics" },
            { name: "Dr. Sameer Reddy", dept: "Oncology" }, { name: "Dr. Anjali Desai", dept: "Oncology" }, { name: "Dr. Kabir Jain", dept: "Oncology" },
            { name: "Dr. Varun Gupta", dept: "Dermatology" }, { name: "Dr. Pooja Iyer", dept: "Dermatology" }, { name: "Dr. Akash Singh", dept: "Dermatology" },
            { name: "Dr. Tarun Kumar", dept: "Ophthalmology" }, { name: "Dr. Sneha Nair", dept: "Ophthalmology" }, { name: "Dr. Rahul Bose", dept: "Ophthalmology" },
            { name: "Dr. Kabir Singh", dept: "Psychiatry" }, { name: "Dr. Aisha Ali", dept: "Psychiatry" }, { name: "Dr. Manish Sen", dept: "Psychiatry" }
        ];

        const deptSelect = document.getElementById('department-select');
        const docSelect = document.getElementById('doctor-select');

        deptSelect.addEventListener('change', function() {
            const dept = this.value;
            docSelect.innerHTML = '<option value="" disabled selected>Select Doctor</option>';
            const filteredDocs = doctorsList.filter(d => d.dept === dept);
            if (filteredDocs.length > 0) {
                docSelect.disabled = false;
                filteredDocs.forEach(doc => {
                    const option = document.createElement('option');
                    option.value = doc.name; option.textContent = doc.name;
                    docSelect.appendChild(option);
                });
            } else { docSelect.disabled = true; }
        });

        // Add New Booking via Admin
        document.getElementById('admin-booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;
            
            try {
                await addDoc(collection(db, "appointments"), {
                    userId: "admin_created_record",
                    patientName: document.getElementById('add-name').value,
                    phone: document.getElementById('add-phone').value,
                    department: deptSelect.value,
                    doctor: docSelect.value,
                    date: document.getElementById('add-date').value,
                    time: document.getElementById('add-time').value,
                    message: "Added manually by Admin",
                    status: "Confirmed",
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                docSelect.disabled = true;
                docSelect.innerHTML = '<option value="" disabled selected>Select Doctor</option>';
                loadAppointments(); // Refresh table
                alert("New booking successfully added!");
            } catch (err) {
                alert("Error adding booking: " + err.message);
            } finally {
                btn.innerHTML = 'Add Booking';
                btn.disabled = false;
            }
        });
    </script>
<script src="chatbot.js"></script>
</body>
</html>
